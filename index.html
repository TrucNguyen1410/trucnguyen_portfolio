<!DOCTYPE html>
<html lang="vi" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- __SITE_URL__ is auto-filled at build time from Vercel's domain (see vite.config.js) -->
    <link rel="canonical" href="__SITE_URL__/" />

    <!-- Hreflang: the app reads ?lang= so these URLs load the matching language -->
    <link rel="alternate" hreflang="vi" href="__SITE_URL__/?lang=vi" />
    <link rel="alternate" hreflang="en" href="__SITE_URL__/?lang=en" />
    <link rel="alternate" hreflang="x-default" href="__SITE_URL__/" />

    <title>Nguyễn Lê Anh Trúc | Software Engineer & Full-stack Developer</title>
    <meta name="description" content="Portfolio của Nguyễn Lê Anh Trúc - Software Engineer chuyên Mobile, Web & AI Integration. Khám phá dự án, kỹ năng và chứng chỉ. Tải CV (VI/EN)." />
    <meta name="keywords" content="Nguyễn Lê Anh Trúc, Portfolio, Software Engineer, Full-stack, Flutter, React, DSS, AHP, AI" />
    <meta name="author" content="Nguyễn Lê Anh Trúc" />

    <!-- Favicon & icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#a1def5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#070b16" media="(prefers-color-scheme: dark)" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Nguyễn Lê Anh Trúc — Portfolio" />
    <meta property="og:title" content="Nguyễn Lê Anh Trúc | Software Engineer & Full-stack Developer" />
    <meta property="og:description" content="Software Engineer chuyên Mobile, Web & AI Integration. Khám phá dự án, kỹ năng và chứng chỉ." />
    <meta property="og:url" content="__SITE_URL__/" />
    <meta property="og:image" content="__SITE_URL__/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Portfolio của Nguyễn Lê Anh Trúc" />
    <meta property="og:locale" content="vi_VN" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nguyễn Lê Anh Trúc | Software Engineer & Full-stack Developer" />
    <meta name="twitter:description" content="Software Engineer chuyên Mobile, Web & AI Integration. Khám phá dự án, kỹ năng và chứng chỉ." />
    <meta name="twitter:image" content="__SITE_URL__/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
